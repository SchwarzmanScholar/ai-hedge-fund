services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
